<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #f5f7fb;
        }

        .auth-shell {
            min-height: 100vh;
        }

        .auth-card {
            max-width: 440px;
            width: 100%;
            border: 0;
            border-radius: 12px;
        }

        .brand-mark {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #0d6efd;
            color: #ffffff;
        }
    </style>
</head>
<body>
<main class="auth-shell d-flex align-items-center justify-content-center py-5">
    <section class="container px-3">
        <div class="card auth-card shadow-sm mx-auto">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <div class="brand-mark d-inline-flex align-items-center justify-content-center fw-bold mb-3">SE</div>
                    <p class="text-uppercase text-primary fw-semibold small mb-2">Smart Event Management Portal</p>
                    <h1 class="h3 fw-bold mb-2">Login</h1>
                    <p class="text-secondary mb-0">Welcome back. Please enter your details.</p>
                </div>

                <div class="alert alert-danger" role="alert" th:if="${param.error}">Invalid email or password.</div>
                <div class="alert alert-success" role="alert" th:if="${param.logout}">You have been logged out.</div>
                <div class="alert alert-success" role="alert" th:if="${success}" th:text="${success}"></div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold" for="username">Email</label>
                        <input class="form-control form-control-lg" id="username" type="email" name="username" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold" for="password">Password</label>
                        <input class="form-control form-control-lg" id="password" type="password" name="password" required>
                    </div>

                    <button class="btn btn-primary btn-lg w-100" type="submit">Login</button>
                </form>

                <p class="text-center text-secondary mt-4 mb-0">
                    New here?
                    <a class="fw-semibold text-decoration-none" th:href="@{/register}">Create an account</a>
                </p>
            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
