<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

</head>
<body>
<main>
    <section>
        <h1>Smart Event Management Portal</h1>
        <h2>Login</h2>

        <p th:if="${param.error}">Invalid email or password.</p>
        <p th:if="${param.logout}">You have been logged out.</p>
        <p th:if="${success}" th:text="${success}"></p>

        <form th:action="@{/login}" method="post">
            <div>
                <label for="username">Email</label>
                <input id="username" type="email" name="username" required autofocus>
            </div>

            <div>
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <p>
            <a th:href="@{/register}">Create an account</a>
        </p>
    </section>
</main>
</body>
</html>
