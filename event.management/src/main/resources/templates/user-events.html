<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-indigo: #4f46e5;
            --ink: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --surface: #ffffff;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        .app-navbar {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(16px);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            color: #ffffff;
            flex: 0 0 auto;
        }

        .page-hero {
            background:
                    radial-gradient(circle at top right, rgba(255, 255, 255, 0.30), transparent 22rem),
                    linear-gradient(135deg, #1d4ed8 0%, #4338ca 58%, #312e81 100%);
            color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(37, 99, 235, 0.22);
        }

        .page-hero p {
            color: rgba(255, 255, 255, 0.78);
        }

        .event-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: 0 16px 44px rgba(15, 23, 42, 0.07);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .event-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 56px rgba(15, 23, 42, 0.10);
        }

        .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(37, 99, 235, 0.10);
            color: var(--brand-blue);
            flex: 0 0 auto;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            border: 0;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
        }

        .btn-outline-secondary {
            border-radius: 12px;
        }

        .text-muted-custom {
            color: var(--muted);
        }

        @media (max-width: 991.98px) {
            .navbar-nav .nav-link,
            .navbar-nav .btn {
                min-height: 48px;
                display: flex;
                align-items: center;
                padding-left: 0.85rem;
                padding-right: 0.85rem;
            }

            .navbar-nav .btn {
                justify-content: center;
                margin-top: 0.5rem;
                width: 100%;
            }
        }

        @media (max-width: 575.98px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .page-hero,
            .event-card {
                border-radius: 16px;
            }

            .event-card .btn {
                width: 100%;
                min-height: 52px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3 fw-bold" th:href="@{/user/dashboard}">
            <span class="brand-mark d-inline-flex align-items-center justify-content-center fw-bold">SE</span>
            <span>Smart Event</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#userEventsNav" aria-controls="userEventsNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="userEventsNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2 pt-3 pt-lg-0">
                <a class="nav-link" th:href="@{/user/dashboard}">Dashboard</a>
                <a class="nav-link active" th:href="@{/user/events}">Events</a>
                <a class="btn btn-outline-secondary ms-lg-2" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    <section class="page-hero p-4 p-lg-5 mb-4 mb-lg-5">
        <div class="row align-items-center g-4">
            <div class="col-lg-8">
                <p class="text-uppercase fw-semibold small mb-3">Browse Events</p>
                <h1 class="display-6 fw-bold mb-3">Events</h1>
                <p class="fs-5 mb-0">Find upcoming events, review the details, and reserve your seat.</p>
            </div>
        </div>
    </section>

    <section>
        <div class="row g-4">
            <div class="col-md-6 col-xl-4" th:each="event : ${events}">
                <article class="event-card h-100 p-4 d-flex flex-column">
                    <div class="d-flex align-items-start gap-3 mb-4">
                        <div class="icon-box d-flex align-items-center justify-content-center">
                            <i class="bi bi-calendar-event fs-5"></i>
                        </div>
                        <div>
                            <h2 class="h5 fw-bold mb-1" th:text="${event.title}">Event Title</h2>
                            <p class="text-muted-custom mb-0" th:text="${event.venue}">Venue</p>
                        </div>
                    </div>

                    <div class="row g-3 small mb-4">
                        <div class="col-12">
                            <span class="text-muted-custom fw-semibold d-block mb-1">Date</span>
                            <span th:text="${#temporals.format(event.startDateTime, 'dd MMM yyyy, hh:mm a')}">Date</span>
                        </div>
                        <div class="col-6">
                            <span class="text-muted-custom fw-semibold d-block mb-1">Capacity</span>
                            <span th:text="${event.capacity}">Capacity</span>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <a class="btn btn-primary w-100 d-inline-flex align-items-center justify-content-center fw-semibold"
                           th:href="@{/user/events/{id}(id=${event.id})}">
                            View Details <i class="bi bi-arrow-right ms-2"></i>
                        </a>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
