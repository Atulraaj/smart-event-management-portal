<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Events</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-indigo: #4f46e5;
            --ink: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --surface: #ffffff;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        .app-navbar {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(16px);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            color: #ffffff;
            flex: 0 0 auto;
        }

        .page-hero,
        .content-card,
        .event-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 16px 44px rgba(15, 23, 42, 0.07);
        }

        .page-hero {
            background:
                    radial-gradient(circle at top right, rgba(255, 255, 255, 0.30), transparent 22rem),
                    linear-gradient(135deg, #1d4ed8 0%, #4338ca 58%, #312e81 100%);
            color: #ffffff;
            box-shadow: 0 24px 70px rgba(37, 99, 235, 0.22);
        }

        .page-hero p {
            color: rgba(255, 255, 255, 0.78);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            border: 0;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
        }

        .btn-outline-secondary,
        .btn-outline-primary,
        .btn-outline-danger {
            border-radius: 12px;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            border-bottom: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .table td,
        .table th {
            padding: 1rem;
            vertical-align: middle;
        }

        .text-muted-custom {
            color: var(--muted);
        }

        @media (max-width: 991.98px) {
            .navbar-nav .nav-link,
            .navbar-nav .btn {
                min-height: 48px;
                display: flex;
                align-items: center;
                padding-left: 0.85rem;
                padding-right: 0.85rem;
            }

            .navbar-nav .btn {
                justify-content: center;
                margin-top: 0.5rem;
                width: 100%;
            }
        }

        @media (max-width: 575.98px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .page-hero,
            .content-card,
            .event-card {
                border-radius: 16px;
            }

            .page-hero .btn {
                width: 100%;
                min-height: 52px;
            }

            .event-card .btn {
                min-height: 46px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3 fw-bold" th:href="@{/admin/dashboard}">
            <span class="brand-mark d-inline-flex align-items-center justify-content-center fw-bold">SE</span>
            <span>Smart Event</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminEventsNav" aria-controls="adminEventsNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminEventsNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2 pt-3 pt-lg-0">
                <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
                <a class="nav-link active" th:href="@{/admin/events}">Events</a>
                <a class="btn btn-outline-secondary ms-lg-2" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    <section class="page-hero p-4 p-lg-5 mb-4">
        <div class="row align-items-center g-4">
            <div class="col-lg-8">
                <p class="text-uppercase fw-semibold small mb-3">Admin Events</p>
                <h1 class="display-6 fw-bold mb-3">Manage Events</h1>
                <p class="fs-5 mb-0">Create, edit, and maintain event details for the Smart Event portal.</p>
            </div>
            <div class="col-lg-4 text-lg-end">
                <a class="btn btn-light btn-lg fw-semibold" th:href="@{/admin/events/new}">
                    <i class="bi bi-plus-lg me-2"></i>Create Event
                </a>
            </div>
        </div>
    </section>

    <section class="content-card d-none d-lg-block overflow-hidden">
        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Venue</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Capacity</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="event : ${events}">
                    <td class="fw-semibold" th:text="${event.title}">Title</td>
                    <td th:text="${event.venue}">Venue</td>
                    <td th:text="${#temporals.format(event.startDateTime, 'dd MMM yyyy, hh:mm a')}">Start</td>
                    <td th:text="${#temporals.format(event.endDateTime, 'dd MMM yyyy, hh:mm a')}">End</td>
                    <td th:text="${event.capacity}">Capacity</td>
                    <td class="text-end">
                        <div class="d-inline-flex gap-2">
                            <a class="btn btn-outline-primary btn-sm" th:href="@{/admin/events/edit/{id}(id=${event.id})}">
                                <i class="bi bi-pencil-square me-1"></i>Edit
                            </a>
                            <a class="btn btn-outline-danger btn-sm" th:href="@{/admin/events/delete/{id}(id=${event.id})}">
                                <i class="bi bi-trash me-1"></i>Delete
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="d-lg-none">
        <div class="row g-3">
            <div class="col-12" th:each="event : ${events}">
                <article class="event-card p-4">
                    <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
                        <div>
                            <h2 class="h5 fw-bold mb-1" th:text="${event.title}">Title</h2>
                            <p class="text-muted-custom mb-0" th:text="${event.venue}">Venue</p>
                        </div>
                        <span class="badge text-bg-primary rounded-pill" th:text="${event.capacity}">Capacity</span>
                    </div>
                    <dl class="row small mb-4">
                        <dt class="col-4 text-muted-custom fw-semibold">Start</dt>
                        <dd class="col-8 mb-2" th:text="${#temporals.format(event.startDateTime, 'dd MMM yyyy, hh:mm a')}">Start</dd>
                        <dt class="col-4 text-muted-custom fw-semibold">End</dt>
                        <dd class="col-8 mb-0" th:text="${#temporals.format(event.endDateTime, 'dd MMM yyyy, hh:mm a')}">End</dd>
                    </dl>
                    <div class="d-grid gap-2">
                        <a class="btn btn-outline-primary" th:href="@{/admin/events/edit/{id}(id=${event.id})}">
                            <i class="bi bi-pencil-square me-2"></i>Edit
                        </a>
                        <a class="btn btn-outline-danger" th:href="@{/admin/events/delete/{id}(id=${event.id})}">
                            <i class="bi bi-trash me-2"></i>Delete
                        </a>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
