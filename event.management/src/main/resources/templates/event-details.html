<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #2563eb;
            --brand-indigo: #4f46e5;
            --ink: #111827;
            --muted: #6b7280;
            --line: #e5e7eb;
            --surface: #ffffff;
        }

        body {
            min-height: 100vh;
            background: #f8fafc;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        .app-navbar {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(16px);
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            color: #ffffff;
            flex: 0 0 auto;
        }

        .hero-panel {
            background:
                    radial-gradient(circle at top right, rgba(255, 255, 255, 0.30), transparent 22rem),
                    linear-gradient(135deg, #1d4ed8 0%, #4338ca 58%, #312e81 100%);
            color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(37, 99, 235, 0.22);
        }

        .hero-panel p {
            color: rgba(255, 255, 255, 0.78);
        }

        .info-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 16px 44px rgba(15, 23, 42, 0.07);
        }

        .detail-row {
            border-top: 1px solid var(--line);
            padding: 1rem 0;
        }

        .detail-row:first-child {
            border-top: 0;
            padding-top: 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-blue), var(--brand-indigo));
            border: 0;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.20);
        }

        .btn-outline-secondary {
            border-radius: 12px;
        }

        .alert {
            border-radius: 12px;
        }

        .text-muted-custom {
            color: var(--muted);
        }

        @media (max-width: 991.98px) {
            .navbar-nav .nav-link,
            .navbar-nav .btn {
                min-height: 48px;
                display: flex;
                align-items: center;
                padding-left: 0.85rem;
                padding-right: 0.85rem;
            }

            .navbar-nav .btn {
                justify-content: center;
                margin-top: 0.5rem;
                width: 100%;
            }
        }

        @media (max-width: 575.98px) {
            .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .hero-panel,
            .info-card {
                border-radius: 16px;
            }

            .btn-primary,
            .btn-outline-secondary {
                width: 100%;
                min-height: 52px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-3 fw-bold" th:href="@{/user/dashboard}">
            <span class="brand-mark d-inline-flex align-items-center justify-content-center fw-bold">SE</span>
            <span>Smart Event</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#eventDetailsNav" aria-controls="eventDetailsNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="eventDetailsNav">
            <div class="navbar-nav ms-auto align-items-lg-center gap-lg-2 pt-3 pt-lg-0">
                <a class="nav-link" th:href="@{/user/events}">Events</a>
                <a class="btn btn-outline-secondary ms-lg-2" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                </a>
            </div>
        </div>
    </div>
</nav>

<main class="container py-4 py-lg-5">
    <section class="hero-panel p-4 p-lg-5 mb-4">
        <div class="row align-items-center g-4">
            <div class="col-lg-8">
                <p class="text-uppercase fw-semibold small mb-3">Event Details</p>
                <h1 class="display-6 fw-bold mb-3" th:text="${event.title}">Event Title</h1>
                <p class="fs-5 mb-0" th:text="${event.description}">Description</p>
            </div>
            <div class="col-lg-4 text-lg-end">
                <a class="btn btn-light btn-lg fw-semibold" th:href="@{/user/events}">
                    <i class="bi bi-arrow-left me-2"></i>Back to Events
                </a>
            </div>
        </div>
    </section>

    <div class="row g-4 align-items-start">
        <div class="col-lg-8">
            <section class="info-card p-4 p-lg-5">
                <h2 class="h4 fw-bold mb-4">Event Information</h2>

                <div class="detail-row">
                    <span class="text-muted-custom fw-semibold d-block mb-1">Venue</span>
                    <span th:text="${event.venue}">Venue</span>
                </div>
                <div class="detail-row">
                    <span class="text-muted-custom fw-semibold d-block mb-1">Start</span>
                    <span th:text="${#temporals.format(event.startDateTime, 'dd MMM yyyy, hh:mm a')}">Start</span>
                </div>
                <div class="detail-row">
                    <span class="text-muted-custom fw-semibold d-block mb-1">End</span>
                    <span th:text="${#temporals.format(event.endDateTime, 'dd MMM yyyy, hh:mm a')}">End</span>
                </div>
                <div class="detail-row pb-0">
                    <span class="text-muted-custom fw-semibold d-block mb-1">Capacity</span>
                    <span th:text="${event.capacity}">Capacity</span>
                </div>
            </section>
        </div>

        <div class="col-lg-4">
            <aside class="info-card p-4">
                <div class="alert alert-success" role="alert" th:if="${success}" th:text="${success}"></div>
                <div class="alert alert-danger" role="alert" th:if="${error}" th:text="${error}"></div>

                <h2 class="h5 fw-bold mb-2">Ready to attend?</h2>
                <p class="text-muted-custom mb-4">Register now to reserve your place for this event.</p>

                <form th:action="@{/user/events/{id}/register(id=${event.id})}" method="post">
                    <button class="btn btn-primary btn-lg w-100 d-inline-flex align-items-center justify-content-center fw-semibold" type="submit">
                        Register for Event <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </form>
            </aside>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
